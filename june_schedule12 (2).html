<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>敬拜排班表</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #f2f2f0; min-height: 100vh;
  display: flex; justify-content: center; padding: 0 0 3rem;
}
.app { width: 100%; max-width: 420px; }

/* ── Header ─────────────────────────────────────── */
.header-card {
  background: #fff; border-radius: 0 0 24px 24px;
  padding: 52px 20px 0; margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.header-card.collapsed .header-collapsible { display: none; }
.header-card.collapsed .header-date-hint { display: none; }
.header-card.collapsed .header-mini { display: flex; }
.header-mini {
  display: none; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 600; color: #1D9E75; margin-top: 2px;
}
.header-top {
  display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px;
}
.header-date { cursor: pointer; user-select: none; display: flex; flex-direction: column; }
.church-title { font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; line-height: 1.2; }
.header-date:hover .day-num { color: #1D9E75; }
.day-num { font-size: 40px; font-weight: 500; color: #1a1a1a; line-height: 1; }
.header-date-hint { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.day-info-text { font-size: 13px; color: #888; }
.chevron-icon { font-size: 14px; color: #bbb; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.today-btn {
  background: #e8f5f0; color: #1D9E75; border: none;
  border-radius: 10px; padding: 7px 16px; font-size: 14px;
  font-weight: 500; cursor: pointer; white-space: nowrap;
}
.today-btn:hover { background: #d0ede4; }
.admin-bar {
  display: none; align-items: center; justify-content: flex-end;
  gap: 8px; margin-bottom: 12px;
}
.admin-bar.show { display: flex; }
.admin-badge {
  display: flex; align-items: center; gap: 5px;
  background: #e8f5f0; color: #1D9E75;
  border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 500;
}
.logout-btn {
  background: none; border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 8px; padding: 4px 10px; font-size: 12px; color: #aaa;
  cursor: pointer; font-family: inherit;
}
.login-entry-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 8px; padding: 5px 12px; font-size: 12px; color: #888;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.week-nav-wrap { display: flex; align-items: center; gap: 4px; }
.nav-arrow {
  background: none; border: none; cursor: pointer;
  color: #bbb; font-size: 20px; padding: 4px; flex-shrink: 0;
  border-radius: 8px; transition: color 0.15s;
}
.nav-arrow:hover { color: #1D9E75; background: #e8f5f0; }
.week-nav { flex: 1; display: flex; align-items: center; justify-content: space-around; gap: 2px; }
.sunday-pill {
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; padding: 6px 10px; border-radius: 16px; transition: background 0.15s; min-width: 48px;
}
.sunday-pill:hover { background: #f0f0f0; }
.sunday-pill .s-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.sunday-pill .s-num {
  font-size: 18px; font-weight: 500; color: #1a1a1a;
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%;
}
.sunday-pill.active .s-num { background: #1D9E75; color: #fff; }
.collapse-tab {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 10px 0 12px; cursor: pointer;
  color: #bbb; font-size: 12px; user-select: none; transition: color 0.15s;
}
.collapse-tab:hover { color: #1D9E75; }
.collapse-tab i { font-size: 16px; transition: transform 0.3s; }
.header-card.collapsed .collapse-tab i { transform: rotate(180deg); }

/* ── Modal overlay ────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.38); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.picker-handle {
  width: 36px; height: 4px; background: #e0e0e0;
  border-radius: 2px; margin: 0 auto 16px;
}

/* Month picker */
.month-picker {
  width: 100%; max-width: 480px; background: #fff;
  border-radius: 24px 24px 0 0; padding: 20px 20px 36px; animation: slideUp 0.25s ease;
}
.picker-title { font-size: 15px; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 6px; }
.picker-year-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
.year-arrow { background: none; border: none; cursor: pointer; color: #aaa; font-size: 20px; padding: 4px 8px; border-radius: 8px; }
.year-arrow:hover { background: #f0f0f0; color: #1a1a1a; }
.year-label { font-size: 16px; font-weight: 600; color: #1a1a1a; min-width: 60px; text-align: center; }
.month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.month-cell {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 12px 4px; border-radius: 14px; cursor: pointer; border: 1.5px solid transparent;
  font-size: 14px; font-weight: 500; color: #1a1a1a; transition: background 0.15s; position: relative;
}
.month-cell:hover { background: #f0f0f0; }
.month-cell.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.month-cell.has-data::after { content:''; display:block; width:5px; height:5px; border-radius:50%; background:#1D9E75; margin-top:4px; }
.month-cell.active::after { background: rgba(255,255,255,0.7); }
.month-cell.no-data { color: #ccc; }

/* ── Scroll area ──────────────────────────────────── */
.scroll-area { padding: 0 14px; }

/* Search */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-input {
  width: 100%; padding: 11px 40px; border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 12px; font-size: 14px; background: #fff; color: #1a1a1a;
  outline: none; font-family: inherit; transition: border-color 0.2s;
}
.search-input:focus { border-color: #1D9E75; }
.search-input::placeholder { color: #bbb; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 17px; pointer-events: none; }
.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: #ddd; border: none; border-radius: 50%;
  width: 20px; height: 20px; display: none; align-items: center;
  justify-content: center; cursor: pointer; color: #666; font-size: 12px; padding: 0;
}
.search-clear.visible { display: flex; }

/* Search results */
.search-result-panel { display: none; flex-direction: column; }
.search-result-panel.visible { display: flex; }
.search-result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.search-result-title { font-size: 13px; color: #888; }
.search-result-title strong { color: #1a1a1a; font-weight: 600; }
.export-btn {
  display: flex; align-items: center; gap: 5px;
  background: #1D9E75; color: #fff; border: none; border-radius: 8px;
  padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.export-btn:hover { background: #178a65; }
.result-date-group { margin-bottom: 14px; }
.result-date-label { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: 0.5px; margin-bottom: 6px; padding-left: 4px; }
.result-item {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border-radius: 12px; padding: 11px 14px;
  margin-bottom: 6px; border: 0.5px solid rgba(0,0,0,0.07);
}
.result-role-badge { display: flex; flex-direction: column; align-items: center; gap: 2px; border-radius: 8px; padding: 5px 7px; min-width: 40px; flex-shrink: 0; }
.result-role-badge i { font-size: 14px; }
.result-role-badge span { font-size: 10px; font-weight: 500; }
.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.result-team { font-size: 12px; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-empty { text-align: center; color: #bbb; font-size: 14px; padding: 2.5rem 0; }
.result-empty i { font-size: 32px; display: block; margin-bottom: 8px; color: #ddd; }

/* ── Notice card ──────────────────────────────────── */
.notice-card {
  background: #F5C842; border-radius: 16px; padding: 14px 16px;
  margin-bottom: 12px; cursor: pointer; transition: filter 0.15s; display: flex; align-items: center; gap: 12px;
}
.notice-card:hover { filter: brightness(0.97); }
.notice-icon-wrap {
  width: 36px; height: 36px; background: rgba(255,255,255,0.45);
  border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.notice-icon-wrap i { font-size: 18px; color: #7a5500; }
.notice-text { flex: 1; overflow: hidden; white-space: nowrap; font-size: 13px; font-weight: 500; color: #5a3e00; line-height: 1.6; }
.notice-text-inner { display: inline-block; min-width: 100%; padding-left: 100%; animation: noticeScroll 16s linear infinite; }
.notice-card:hover .notice-text-inner { animation-play-state: paused; }
@keyframes noticeScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* Notice detail modal */
.notice-detail {
  width: 100%; max-width: 480px; background: #fff;
  border-radius: 24px 24px 0 0; padding: 20px 20px 40px; animation: slideUp 0.25s ease;
}
.notice-detail-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 18px; }
.notice-detail-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.06);
}
.notice-detail-row:last-child { border-bottom: none; }
.nd-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nd-icon i { font-size: 17px; }
.nd-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.nd-value { font-size: 14px; font-weight: 500; color: #1a1a1a; }

/* ── Song cards ───────────────────────────────────── */
.section-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.section-ttl { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.upload-song-btn {
  display: none; align-items: center; gap: 4px; background: #e8f5f0;
  color: #1D9E75; border: none; border-radius: 8px; padding: 5px 10px;
  font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.upload-song-btn.show { display: flex; }
.song-slider-wrap { margin-bottom: 4px; }
.song-slider {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
}
.song-slider::-webkit-scrollbar { display: none; }
.song-card {
  flex-shrink: 0; width: 130px; background: #fff;
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08); cursor: pointer;
  scroll-snap-align: start; transition: transform 0.15s;
  border: 0.5px solid rgba(0,0,0,0.06);
}
.song-card:hover { transform: scale(1.02); }
.song-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.song-card-placeholder { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #f5f5f2; }
.song-card-placeholder i { font-size: 36px; color: #d0d0cc; }
.song-card-label { font-size: 12px; font-weight: 500; color: #444; padding: 8px 10px 10px; line-height: 1.3; }
.song-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 14px; }
.song-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
.song-dot.active { background: #1D9E75; }
.song-empty {
  background: #fff; border-radius: 14px; padding: 24px 16px;
  text-align: center; color: #bbb; font-size: 13px; margin-bottom: 14px;
  border: 1px dashed #e0e0e0;
}
.song-empty i { font-size: 28px; display: block; margin-bottom: 8px; color: #ddd; }

/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.9); z-index: 300;
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 80vh; border-radius: 12px; object-fit: contain; }
.lightbox-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,0.15); border: none; color: #fff;
  border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px;
}
.lightbox-title { color: rgba(255,255,255,0.8); font-size: 14px; }

/* ── Upload song modal ────────────────────────────── */
.upload-modal {
  width: 100%; max-width: 480px; background: #fff;
  border-radius: 24px 24px 0 0; padding: 20px 20px 40px; animation: slideUp 0.25s ease;
  max-height: 85vh; overflow-y: auto;
}
.upload-modal-title { font-size: 16px; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 4px; }
.upload-modal-sub { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 18px; }
.upload-song-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.upload-song-row {
  display: flex; align-items: center; gap: 8px;
  background: #f8f8f6; border-radius: 12px; padding: 10px 12px;
}
.upload-song-thumb {
  width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
  background: #e8e8e5; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.upload-song-thumb img { width: 100%; height: 100%; object-fit: cover; }
.upload-song-thumb i { font-size: 20px; color: #ccc; }
.upload-song-name { flex: 1; font-size: 13px; color: #333; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.remove-song-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; padding: 2px; flex-shrink: 0; }
.remove-song-btn:hover { color: #e74c3c; }
.add-song-area { border: 1.5px dashed rgba(0,0,0,0.15); border-radius: 14px; padding: 14px; }
.add-song-area-title { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 10px; }
.add-song-name-input {
  width: 100%; padding: 9px 12px; border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 10px; font-size: 13px; color: #1a1a1a; outline: none;
  font-family: inherit; margin-bottom: 8px;
}
.add-song-name-input:focus { border-color: #1D9E75; }
.add-song-url-input {
  width: 100%; padding: 9px 12px; border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 10px; font-size: 13px; color: #1a1a1a; outline: none;
  font-family: inherit; margin-bottom: 8px;
}
.add-song-url-input:focus { border-color: #1D9E75; }
.add-song-or { text-align: center; font-size: 12px; color: #bbb; margin: 4px 0 8px; }
.local-upload-btn {
  width: 100%; padding: 9px; border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 10px; font-size: 13px; color: #666; cursor: pointer;
  background: #fff; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.local-upload-btn:hover { border-color: #1D9E75; color: #1D9E75; }
#localFileInput { display: none; }
.confirm-add-song-btn {
  width: 100%; padding: 10px; background: #1D9E75; color: #fff;
  border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; margin-top: 8px;
}
.confirm-add-song-btn:hover { background: #178a65; }

/* ── Schedule ─────────────────────────────────────── */
.schedule-section-label { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
.main-card {
  background: #fff; border-radius: 20px;
  padding: 16px 14px 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 1rem;
}
.card-date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-date-label { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.card-date-label span { color: #1D9E75; margin-left: 5px; }
.card-divider { height: 1px; background: rgba(0,0,0,0.07); margin: 0 0 12px; border: none; }
.role-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.role-label { min-width: 50px; padding-top: 10px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.role-badge { display: flex; flex-direction: column; align-items: center; gap: 3px; border-radius: 10px; padding: 6px 8px; width: 100%; }
.role-badge .role-icon { font-size: 17px; line-height: 1; }
.role-badge .role-text { font-size: 10px; font-weight: 500; line-height: 1; }
.shift-card {
  flex: 1; background: #fff; border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: 14px; padding: 10px 12px; position: relative; min-width: 0;
}
.shift-card.active-card { background: #1D9E75; border-color: #1D9E75; }
.shift-card.editable { cursor: pointer; }
.shift-card.editable:hover { box-shadow: 0 0 0 2px #1D9E75; }
.shift-name { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; word-break: break-all; padding-right: 20px; }
.active-card .shift-name { color: #fff; }
.persons { display: flex; flex-direction: column; gap: 4px; }
.person { display: flex; align-items: center; gap: 6px; }
.avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; }
.person-name { font-size: 12px; color: #888; word-break: break-all; }
.active-card .person-name { color: rgba(255,255,255,0.85); }
.more-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; cursor: pointer; color: #ccc; font-size: 15px; line-height: 1; }
.active-card .more-btn { color: rgba(255,255,255,0.6); }
.empty-state { text-align: center; color: #bbb; font-size: 14px; padding: 2rem 0; }
.empty-state i { font-size: 32px; display: block; margin-bottom: 8px; color: #ddd; }
.add-row { display: flex; justify-content: center; margin-top: 8px; padding-bottom: 8px; }
.add-btn { background: none; border: 0.5px solid rgba(0,0,0,0.18); border-radius: 10px; padding: 8px 24px; font-size: 14px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; }
.add-btn.admin-add { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.add-btn.admin-add:hover { background: #178a65; }

/* ── Export choice modal ──────────────────────────── */
.export-choice {
  width: 100%; max-width: 480px; background: #fff;
  border-radius: 24px 24px 0 0; padding: 20px 20px 40px; animation: slideUp 0.25s ease;
}
.export-choice-title { font-size: 16px; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 4px; }
.export-choice-sub { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 20px; }
.export-option {
  display: flex; align-items: center; gap: 14px;
  background: #f8f8f6; border-radius: 14px; padding: 16px;
  cursor: pointer; margin-bottom: 10px; border: 2px solid transparent; transition: all 0.15s;
}
.export-option:hover { border-color: #1D9E75; background: #e8f5f0; }
.export-option-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.export-option-icon i { font-size: 20px; }
.export-option-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
.export-option-desc { font-size: 12px; color: #aaa; }

/* ── Login modal ──────────────────────────────────── */
.login-modal {
  width: 100%; max-width: 480px; background: #fff;
  border-radius: 24px 24px 0 0; padding: 24px 24px 40px; animation: slideUp 0.25s ease;
}
.login-title { font-size: 17px; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 22px; }
.form-field { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: #666; margin-bottom: 6px; }
.form-input { width: 100%; padding: 11px 14px; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 12px; font-size: 14px; color: #1a1a1a; outline: none; font-family: inherit; transition: border-color 0.2s; background: #fff; }
.form-input:focus { border-color: #1D9E75; }
.form-error { font-size: 12px; color: #e74c3c; margin-top: 6px; display: none; }
.form-error.show { display: block; }

<div class="app">

function escapeHtml(str){ return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

}
function updateBibleChapterOptions(preferredChapter){

function getBibleChapterUrl(){
  const book=getSelectedBibleBook();
  const chapter=document.getElementById('bibleChapterSelect')?.value||1;
  return `https://wd.bible/bible/${book.abbr}.${chapter}.cunps`;
}
function updateBibleSourceLink(){
  const link=document.getElementById('bibleSourceLink');
  if(!link) return;
  const book=getSelectedBibleBook(), chapter=document.getElementById('bibleChapterSelect')?.value||1, url=getBibleChapterUrl();
  link.innerHTML=`来源：<a href="${url}" target="_blank" rel="noopener">${book.name} ${chapter}章 · 微读圣经</a>`;
}
function parseBibleChapter(html, bookName, chapter){
  const doc=new DOMParser().parseFromString(html,'text/html');
  doc.querySelectorAll('script,style,nav,header,footer,button,input,svg').forEach(el=>el.remove());
  const raw=(doc.body?.textContent||'').replace(/\u00a0/g,' ');
  const lines=raw.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const titleRe=new RegExp(`${bookName}\\s*第\\s*${chapter}\\s*章`);
  let start=lines.findIndex(line=>titleRe.test(line));
  if(start<0) start=lines.findIndex(line=>line.includes(bookName)&&line.includes(`第 ${chapter} 章`));
  const kept=[];
  for(let i=Math.max(start+1,0); i<lines.length; i++){
    const line=lines[i];
    if(/Copyright|Used by permission|WeDevote|隐私政策|使用条款|反馈|奉献/.test(line)) break;
    if(/^(首页|圣经|资源|计划|搜索|播放|全屏|版本对照|APP下载|联系我们|更多)$/.test(line)) continue;
    kept.push(line);
  }
  return kept;
}
function renderBibleLines(bookName, chapter, lines){
  if(!lines.length) return '<div class="bible-empty">没有截取到正文，可点击上方来源链接查看原文。</div>';
  const html=lines.map(line=>{
    const verse=line.match(/^(\d+)\s*(.+)$/);
    if(verse) return `<div class="bible-verse"><span class="bible-verse-num">${verse[1]}</span><div class="bible-verse-text">${escapeHtml(verse[2])}</div></div>`;
    return `<div class="bible-subtitle">${escapeHtml(line.replace(/^#+\s*/,''))}</div>`;
  }).join('');
  return `<div class="bible-result-item"><div class="bible-chapter-title">${escapeHtml(bookName)} 第 ${chapter} 章</div>${html}</div>`;
}
async function loadBibleChapter(){
  const list=document.getElementById('bibleResultList');
  const book=getSelectedBibleBook();
  const chapter=document.getElementById('bibleChapterSelect')?.value||1;
  const url=getBibleChapterUrl();
  updateBibleSourceLink();
  if(!list) return;
  list.innerHTML='<div class="bible-loading">正在读取经文...</div>';
  try{
    const res=await fetch(url,{mode:'cors'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const html=await res.text();
    const lines=parseBibleChapter(html,book.name,chapter);
    list.innerHTML=renderBibleLines(book.name,chapter,lines);
  }catch(err){
    list.innerHTML=`<div class="bible-result-item"><div class="bible-chapter-title">${escapeHtml(book.name)} 第 ${chapter} 章</div><iframe class="bible-frame" src="${url}" loading="lazy"></iframe><div class="bible-empty"><button class="bible-external-btn" onclick="window.open('${url}','_blank')"><i class="ti ti-external-link"></i>打开原文网页</button></div></div>`;
  }
}

  Object.entries(scheduleData).forEach(([key,shifts])=>{
    if(!key.startsWith(prefix)) return;
    shifts.forEach(s=>{ if(s.persons.some(p=>p.includes(q))){ const[,m,dd]=key.split('-'); results.push({key,dateLabel:`${parseInt(m)}月${parseInt(dd)}日（周日）`,role:s.role,shiftName:s.name,team:s.persons.join(' / ')}); }});
  });
  const ms=`${d.getFullYear()}年${d.getMonth()+1}月`;
  title.innerHTML=results.length?`<strong>${q}</strong> 在 ${ms} 共 <strong>${results.length}</strong> 条排班`:`${ms} 未找到 <strong>${q}</strong>`;
  if(!results.length){ list.innerHTML=`<div class="result-empty"><i class="ti ti-mood-empty"></i>本月暂无该人员的排班</div>`; return; }
  const grouped={};
  results.forEach(r=>{ if(!grouped[r.key]) grouped[r.key]={label:r.dateLabel,items:[]}; grouped[r.key].items.push(r); });
  list.innerHTML=Object.entries(grouped).map(([,g])=>`
    <div class="result-date-group"><div class="result-date-label">${g.label}</div>
    ${g.items.map(r=>{ const c=roleColors[r.role]||{badgeBg:'#888',badgeText:'#fff',icon:'ti-user'}; return `<div class="result-item"><div class="result-role-badge" style="background:${c.badgeBg}"><i class="ti ${c.icon}" style="color:${c.badgeText}"></i><span style="color:${c.badgeText}">${r.role}</span></div><div class="result-info"><div class="result-name">${r.shiftName}</div><div class="result-team">${r.team}</div></div></div>`; }).join('')}
    </div>`).join('');
}

// ── Admin edit ────────────────────────────────────────
const allPeople={
  '主领':['根英','佳欣','丽娜','张荣','嘉乐','美美','雨婷','林上恩','慧慧'],
  '伴唱':['曼茹','建蝉','张荣','小小','加恩','嘉乐','婷婷','Irene','安娜','雨婷','富雄','根英'],
  '键盘':['慧慧','雨婷','孙望','叶合均','美美','玲晓'],
  '吉他':['佳欣','嘉乐','智博','周周'],
  '贝斯':['诗诗','Isaac'],
  '鼓':['周阳','Isaac','Irene'],
  '教歌':['张荣','美美','慧慧','根英'],
};
Object.keys(allPeople).forEach(k=>{ allPeople[k]=[...new Set(allPeople[k])]; });
const ROLES=['主领','伴唱','键盘','吉他','贝斯','鼓','教歌'];
let editMode=null,editKey=null,editRole=null,editSelections={},customPeople={};

function openAddDrawer(){ if(!isAdmin)return; editMode='add'; editKey=toKey(selectedSunday); editRole=null; editSelections={}; customPeople={};
  const ex=scheduleData[editKey]||[];
  ROLES.forEach(r=>{ const f=ex.find(s=>s.role===r); editSelections[r]=new Set(f?f.persons:[]); customPeople[r]=[]; });
  renderEditDrawer(); document.getElementById('editOverlay').classList.add('open'); }
function openEditDrawer(role,key){ if(!isAdmin)return; editMode='edit'; editKey=key; editRole=role; editSelections={}; customPeople={};
  const f=(scheduleData[key]||[]).find(s=>s.role===role);
  editSelections[role]=new Set(f?f.persons:[]); customPeople[role]=[];
  renderEditDrawer(); document.getElementById('editOverlay').classList.add('open'); }
function closeEdit(e){ if(!e||e.target===document.getElementById('editOverlay')) document.getElementById('editOverlay').classList.remove('open'); }

function renderEditDrawer(){
  const d=selectedSunday, roles=editMode==='edit'?[editRole]:ROLES;
  document.getElementById('editDrawerTitle').textContent=editMode==='edit'?`修改「${editRole}」安排`:'新增排班';
  document.getElementById('editDrawerSub').textContent=`${d.getMonth()+1}月${d.getDate()}日（周日）`;
  const c=document.getElementById('editRoleSections'); c.innerHTML='';
  roles.forEach(role=>{
    const col=roleColors[role]||{badgeBg:'#888',badgeText:'#fff',icon:'ti-user'};
    const sel=editSelections[role]||new Set();
    const base=allPeople[role]||[];
    const custom=customPeople[role]||[];
    const all=[...base,...custom.filter(p=>!base.includes(p))];
    const sec=document.createElement('div'); sec.className='role-section';
    const chips=all.map(p=>{
      const isCustom=!base.includes(p);
      return `<button class="person-chip ${sel.has(p)?'selected':''} ${isCustom?'custom-chip':''}" onclick="togglePerson('${role}','${p}')">
        <i class="ti ti-check chip-check"></i>${p}<span class="chip-remove" onclick="event.stopPropagation();removePerson('${role}','${p}')">×</span></button>`;
    }).join('');
    sec.innerHTML=`
      <div class="role-section-head"><div class="role-section-badge" style="background:${col.badgeBg}"><i class="ti ${col.icon}" style="color:${col.badgeText}"></i><span style="color:${col.badgeText}">${role}</span></div></div>
      <div class="people-grid" id="grid-${role}">${chips}</div>
      <div class="add-person-row">
        <input class="add-person-input" id="inp-${role}" placeholder="手动输入人名" onkeydown="if(event.key==='Enter')addCustomPerson('${role}')">
        <button class="add-person-btn" onclick="addCustomPerson('${role}')">添加</button>
      </div>`;
    c.appendChild(sec);
  });
}
function togglePerson(role,name){
  if(!editSelections[role]) editSelections[role]=new Set();
  const sel=editSelections[role]; sel.has(name)?sel.delete(name):sel.add(name);
  document.querySelectorAll(`#grid-${role} .person-chip`).forEach(btn=>{
    const n=btn.textContent.replace('×','').trim(); btn.classList.toggle('selected',sel.has(n));
  });
}
function addCustomPerson(role){
  const inp=document.getElementById(`inp-${role}`);
  const name=inp.value.trim(); if(!name) return;
  if(!customPeople[role]) customPeople[role]=[];
  if(!customPeople[role].includes(name)&&!(allPeople[role]||[]).includes(name)) customPeople[role].push(name);
  if(!editSelections[role]) editSelections[role]=new Set();
  editSelections[role].add(name); inp.value=''; renderEditDrawer();
}
function removePerson(role,name){
  const idx=(customPeople[role]||[]).indexOf(name);
  if(idx>-1) customPeople[role].splice(idx,1);
  if(editSelections[role]) editSelections[role].delete(name);
  renderEditDrawer();
}
function saveEdit(){
  const key=editKey;
  if(!scheduleData[key]) scheduleData[key]=[];
  const roles=editMode==='edit'?[editRole]:ROLES;
  roles.forEach(role=>{
    const persons=[...(editSelections[role]||[])];
    if(!persons.length){ scheduleData[key]=scheduleData[key].filter(s=>s.role!==role); return; }
    const ex=scheduleData[key].find(s=>s.role===role);
    if(ex){ex.persons=persons;ex.name=persons.join('/');}
    else scheduleData[key].push({role,name:persons.join('/'),persons});
  });
  scheduleData[key].sort((a,b)=>ROLES.indexOf(a.role)-ROLES.indexOf(b.role));
  if(!scheduleData[key].length) delete scheduleData[key];
  closeEdit(); render();
}

// ── Export ────────────────────────────────────────────
function doExport(mode){
  document.getElementById('exportChoiceOverlay').classList.remove('open');
  const d=selectedSunday, year=d.getFullYear(), month=d.getMonth();
  const prefix=`${year}-${String(month+1).padStart(2,'0')}-`;
  const sundays=getSundaysOfMonth(year,month);
  const keys=mode==='week'?[toKey(d)]:sundays.map(s=>toKey(s)).filter(k=>scheduleData[k]);

  const dpr=window.devicePixelRatio||1;
  const W=720, padX=28, padY=20;
  const colW=(W-padX*2)/5; // 类别 + 4 sundays (or 1)
  const cols=mode==='week'?1:Math.min(keys.length,4);
  const totalCols=cols+1;
  const cw=(W-padX*2)/totalCols;
  const rowH=48, hdrH=80, dateRowH=44;
  const roles=ROLES.filter(r=>keys.some(k=>(scheduleData[k]||[]).find(s=>s.role===r)));
  const H=hdrH+dateRowH+(roles.length*rowH)+padY*2+20;

  const canvas=document.getElementById('exportCanvas');
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);

  // background
  ctx.fillStyle='#f2f2f0'; ctx.fillRect(0,0,W,H);
  // title bar
  rr(ctx,0,0,W,hdrH,0,'#1D9E75');
  ctx.fillStyle='#fff'; ctx.font='bold 20px PingFang SC,sans-serif'; ctx.textAlign='center';
  const titleStr=`${year}年${ZH_MONTHS[month]}月份敬拜排班表`;
  ctx.fillText(titleStr,W/2,36);
  ctx.font='13px PingFang SC,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.75)';
  const subStr=mode==='week'?`${month+1}月${d.getDate()}日（周日）`:`本月全部 ${keys.length} 个主日`;
  ctx.fillText(subStr,W/2,60);

  // table header
  ctx.fillStyle='#fff'; ctx.fillRect(padX,hdrH,W-padX*2,dateRowH);
  ctx.fillStyle='#555'; ctx.font='bold 13px PingFang SC,sans-serif'; ctx.textAlign='center';
  ctx.fillText('类别',padX+cw/2,hdrH+28);
  keys.forEach((k,i)=>{
    const[,m,dd]=k.split('-');
    ctx.fillStyle='#1D9E75'; ctx.font='bold 13px PingFang SC,sans-serif';
    ctx.fillText(`${parseInt(m)}/${parseInt(dd)}`,padX+cw*(i+1)+cw/2,hdrH+28);
  });

  // divider
  ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(padX,hdrH+dateRowH); ctx.lineTo(W-padX,hdrH+dateRowH); ctx.stroke();

  // rows
  roles.forEach((role,ri)=>{
    const y=hdrH+dateRowH+ri*rowH;
    const bg=ri%2===0?'#ffffff':'#f9f9f7';
    ctx.fillStyle=bg; ctx.fillRect(padX,y,W-padX*2,rowH);
    const col=roleColors[role]||{badgeBg:'#888',badgeText:'#fff'};
    rr(ctx,padX+6,y+10,cw-20,rowH-20,8,col.badgeBg);
    ctx.fillStyle=col.badgeText; ctx.font='bold 12px PingFang SC,sans-serif'; ctx.textAlign='center';
    ctx.fillText(role,padX+6+(cw-20)/2,y+rowH/2+4);
    keys.forEach((k,i)=>{
      const shift=(scheduleData[k]||[]).find(s=>s.role===role);
      const cx=padX+cw*(i+1), cy=y;
      ctx.fillStyle='#333'; ctx.font='12px PingFang SC,sans-serif'; ctx.textAlign='center';
      if(shift){
        const names=shift.persons;
        if(names.length===1){ ctx.fillText(names[0],cx+cw/2,cy+rowH/2+4); }
        else{
          const line1=names.slice(0,Math.ceil(names.length/2)).join('/');
          const line2=names.slice(Math.ceil(names.length/2)).join('/');
          ctx.fillStyle='#444'; ctx.font='11px PingFang SC,sans-serif';
          ctx.fillText(line1,cx+cw/2,cy+rowH/2-4);
          ctx.fillText(line2,cx+cw/2,cy+rowH/2+12);
        }
      } else { ctx.fillStyle='#ccc'; ctx.fillText('—',cx+cw/2,cy+rowH/2+4); }
    });
    // row divider
    ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padX,y+rowH); ctx.lineTo(W-padX,y+rowH); ctx.stroke();
    // col dividers
    for(let i=1;i<=keys.length;i++){
      const x=padX+cw*i;
      ctx.beginPath(); ctx.moveTo(x,hdrH); ctx.lineTo(x,y+rowH); ctx.stroke();
    }
  });

  // outer border
  ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1.5;
  ctx.strokeRect(padX,hdrH,W-padX*2,dateRowH+roles.length*rowH);

  const a=document.createElement('a');
  const fname=mode==='week'?`排班_${month+1}月${d.getDate()}日.png`:`排班_${year}年${month+1}月全部.png`;
  a.download=fname; a.href=canvas.toDataURL('image/png'); a.click();
}

function rr(ctx,x,y,w,h,r,fill){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
}

// ── Init ──────────────────────────────────────────────
function goToday(){
  const now=new Date(), s=getSundaysOfMonth(now.getFullYear(),now.getMonth());
  let t=s.find(x=>x.toDateString()===now.toDateString());
  if(!t){ const f=s.filter(x=>x>=now); t=f.length?f[0]:s[s.length-1]; }
  selectedSunday=t; updateAdminUI(); render();
}
initBibleSelectors();
goToday();
</script>
